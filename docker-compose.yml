services:
  web-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime # <--- Usa la parte de la API
    container_name: tp-tacs-grupo-4-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  web-client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client-runtime # <--- Usa la parte de Nginx
    container_name: tp-tacs-grupo-4-client
    ports:
      - "5001:80"
    depends_on:
      - web-api