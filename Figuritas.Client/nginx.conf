server {
    listen 80;

    # Proxy hacia la API. ${API_BASE_URL} se sustituye al arrancar el contenedor
    # via envsubst (nginx:alpine lo hace automáticamente al copiar este archivo
    # como /etc/nginx/templates/default.conf.template).
    # Ejemplos de valor:
    #   Docker Compose : http://web-api:8080
    #   Cloud Run      : https://figuritas-api-xxxx.run.app
    location /api/ {
        proxy_pass ${API_BASE_URL};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $proxy_host;
        proxy_ssl_server_name on;
        proxy_cache_bypass $http_upgrade;
    }

    # Servir la App de Blazor (SPA fallback)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html =404;
    }
}