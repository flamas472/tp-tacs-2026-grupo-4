services:
  mongo-tacs:
    image: mongodb/mongodb-community-server:latest
    container_name: mongo-tacs
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      
  web-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime # <--- Usa la parte de la API
    container_name: tp-tacs-grupo-4-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_KEY}  # <--- Esto vincula el .env con la API

  web-client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client-runtime # <--- Usa la parte de Nginx
    container_name: tp-tacs-grupo-4-client
    ports:
      - "5001:80"
    depends_on:
      - web-api